<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Спасибо за заявку</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f1f2e;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .thank-card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 18px;
      padding: 36px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(31, 31, 46, 0.12);
    }

    .icon {
      width: 68px;
      height: 68px;
      margin: 0 auto 22px;
      border-radius: 50%;
      background: #f0ecff;
      color: #6b46ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 30px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 24px;
      font-size: 16px;
      line-height: 1.5;
      color: #66667a;
    }

    a {
      display: inline-block;
      padding: 13px 18px;
      border-radius: 12px;
      background: #6b46ff;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      background: #5635df;
    }

    .note {
      margin-top: 22px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #f0ecff;
      color: #2e245f;
      font-size: 13px;
      line-height: 1.45;
      text-align: left;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="thank-card">
      <div class="icon">✓</div>

      <h1>Спасибо за заявку!</h1>

      <p>
        Данные формы условно отправлены. Эта страница используется как пример страницы благодарности для настройки макроцели.
      </p>

      <a href="thank-you-form.html">Вернуться к форме</a>

      <div class="note">
        В аналитике такую цель часто настраивают по посещению URL страницы благодарности.
      </div>
    </section>
  </main>
</body>
</html>

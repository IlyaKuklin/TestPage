  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f1f2e;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .form-card {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 16px 40px rgba(31, 31, 46, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 26px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 24px;
      font-size: 15px;
      line-height: 1.5;
      color: #66667a;
    }

    .progress {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .progress-item {
      flex: 1;
      height: 8px;
      border-radius: 999px;
      background: #e7e7f2;
    }

    .progress-item.active {
      background: #6b46ff;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 13px 14px;
      border: 1px solid #d8d8e8;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background: #ffffff;
    }

    input:focus,
    select:focus {
      border-color: #6b46ff;
      box-shadow: 0 0 0 3px rgba(107, 70, 255, 0.14);
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 22px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      background: #6b46ff;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #5635df;
    }

    .secondary-button {
      background: #ececf6;
      color: #33334a;
    }

    .secondary-button:hover {
      background: #dedeee;
    }

    .success-message {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #edf8ef;
      color: #226b35;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 700;
    }

    .note {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #f0ecff;
      color: #2e245f;
      font-size: 13px;
      line-height: 1.45;
    }

    code {
      background: rgba(107, 70, 255, 0.12);
      padding: 2px 5px;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="form-card">
      <h1>Многошаговая форма</h1>

      <p>
        Пример формы из трёх шагов. После каждого шага данные отправляются в <code>dataLayer</code>.
        Финальная кнопка вызывает событие <code>submit</code>.
      </p>

      <div class="progress">
        <div class="progress-item active" data-progress="1"></div>
        <div class="progress-item" data-progress="2"></div>
        <div class="progress-item" data-progress="3"></div>
      </div>

      <form id="multiStepForm" action="" method="GET">
        <div class="step active" data-step="1">
          <div class="form-group">
            <label for="name">Ваше имя</label>
            <input
              id="name"
              name="name"
              type="text"
              placeholder="Например, Анна"
              required
            />
          </div>

          <div class="buttons">
            <button type="button" id="step1Button">
              Далее
            </button>
          </div>
        </div>

        <div class="step" data-step="2">
          <div class="form-group">
            <label for="phone">Телефон</label>
            <input
              id="phone"
              name="phone"
              type="tel"
              placeholder="+7 999 123-45-67"
              required
            />
          </div>

          <div class="buttons">
            <button type="button" class="secondary-button" data-back="1">
              Назад
            </button>

            <button type="button" id="step2Button">
              Далее
            </button>
          </div>
        </div>

        <div class="step" data-step="3">
          <div class="form-group">
            <label for="service">Интересующая услуга</label>
            <select id="service" name="service" required>
              <option value="">Выберите услугу</option>
              <option value="audit">Аудит аналитики</option>
              <option value="metrika">Настройка Яндекс Метрики</option>
              <option value="ytm">Настройка Яндекс Tag Manager</option>
            </select>
          </div>

          <div class="buttons">
            <button type="button" class="secondary-button" data-back="2">
              Назад
            </button>

            <button type="submit">
              Отправить заявку
            </button>
          </div>
        </div>
      </form>

      <div id="successMessage" class="success-message">
        Спасибо! Многошаговая форма успешно отправлена.
      </div>
    </section>
  </main>

  <script>
    const form = document.querySelector('#multiStepForm');
    const successMessage = document.querySelector('#successMessage');

    const nameInput = document.querySelector('#name');
    const phoneInput = document.querySelector('#phone');
    const serviceSelect = document.querySelector('#service');

    const step1Button = document.querySelector('#step1Button');
    const step2Button = document.querySelector('#step2Button');

    const steps = document.querySelectorAll('.step');
    const progressItems = document.querySelectorAll('.progress-item');

    function showStep(stepNumber) {
      steps.forEach(function (step) {
        step.classList.toggle('active', step.dataset.step === String(stepNumber));
      });

      progressItems.forEach(function (item) {
        item.classList.toggle('active', Number(item.dataset.progress) <= stepNumber);
      });
    }

    function pushToDataLayer(eventName, stepNumber, extraData) {
      const eventData = {
        event: eventName,
        form_name: 'multi_step_form',
        form_step: stepNumber,
        ...extraData
      };

      window.dataLayer.push(eventData);

      //console.log('dataLayer push:', eventData);
    }

    function validateField(field) {
      if (!field.checkValidity()) {
        field.reportValidity();
        return false;
      }

      return true;
    }

    step1Button.addEventListener('click', function () {
      if (!validateField(nameInput)) return;

      pushToDataLayer('multi_step_form_step_1', 1, {
        user_name: nameInput.value.trim()
      });

      showStep(2);
    });

    step2Button.addEventListener('click', function () {
      if (!validateField(phoneInput)) return;

      pushToDataLayer('multi_step_form_step_2', 2, {
        phone: phoneInput.value.trim()
      });

      showStep(3);
    });

    document.querySelectorAll('[data-back]').forEach(function (button) {
      button.addEventListener('click', function () {
        showStep(Number(button.dataset.back));
      });
    });

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      if (!validateField(serviceSelect)) return;

      pushToDataLayer('multi_step_form_step_3', 3, {
        service: serviceSelect.value
      });

      pushToDataLayer('multi_step_form_submit', 3, {
        user_name: nameInput.value.trim(),
        phone: phoneInput.value.trim(),
        service: serviceSelect.value
      });

      form.style.display = 'none';
      successMessage.style.display = 'block';

      console.log('Событие submit произошло на финальном шаге');
    });
  </script>
</body>
</html>

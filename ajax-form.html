<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Форма без перезагрузки страницы</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f1f2e;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .form-card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 16px 40px rgba(31, 31, 46, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 26px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 24px;
      font-size: 15px;
      line-height: 1.5;
      color: #66667a;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 13px 14px;
      border: 1px solid #d8d8e8;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #6b46ff;
      box-shadow: 0 0 0 3px rgba(107, 70, 255, 0.14);
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      background: #6b46ff;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #5635df;
    }

    button:disabled {
      cursor: default;
      opacity: 0.7;
    }

    .success-message {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #edf8ef;
      color: #226b35;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 700;
    }

    .note {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #f0ecff;
      color: #2e245f;
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="form-card">
      <h1>Заявка без перезагрузки</h1>

      <p>
        Пример формы, которая отправляется через JavaScript. После отправки URL страницы не меняется.
      </p>

      <form id="ajaxForm">
        <div class="form-group">
          <label for="name">Ваше имя</label>
          <input
            id="name"
            name="name"
            type="text"
            placeholder="Например, Анна"
            required
          />
        </div>

        <div class="form-group">
          <label for="phone">Телефон</label>
          <input
            id="phone"
            name="phone"
            type="tel"
            placeholder="+7 999 123-45-67"
            required
          />
        </div>

        <button id="submitButton" type="submit">
          Отправить заявку
        </button>
      </form>

      <div id="successMessage" class="success-message">
        Спасибо! Заявка успешно отправлена.
      </div>

      <div class="note">
        Здесь событие submit происходит, но стандартная отправка формы отменяется через JavaScript.
        Страница не перезагружается.
      </div>
    </section>
  </main>

  <script>
    const form = document.querySelector('#ajaxForm');
    const button = document.querySelector('#submitButton');
    const successMessage = document.querySelector('#successMessage');

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      console.log('Форма отправлена без перезагрузки страницы');

      button.disabled = true;
      button.textContent = 'Отправляем...';

      setTimeout(function () {
        form.reset();

        button.disabled = false;
        button.textContent = 'Отправить заявку';

        successMessage.style.display = 'block';

        console.log('Показано сообщение об успешной отправке');
      }, 700);
    });
  </script>
</body>
</html>

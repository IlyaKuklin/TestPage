      --card: #ffffff;

      --accent: #6b46ff;
      --line: #e7e2ff;
      --soft: #f1edff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #e9e2ff 0, transparent 34%),

    .page {

      align-items: center;

    .hero {

      padding: 34px;

      border-radius: 28px;
      background: rgba(255, 255, 255, .82);
      box-shadow: 0 18px 55px rgba(83, 64, 160, .12);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1 {
      max-width: 820px;
      margin: 0 0 14px;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1.02;
    }

    .lead {
      max-width: 780px;
      margin: 0 0 26px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

      display: inline-flex;
      align-items: center;
      justify-content: center;

      border-radius: 16px;
      background: var(--accent);
      color: #ffffff;
      font-size: 15px;
      font-weight: 800;
      text-decoration: none;
    }

    .catalog-link:hover { filter: brightness(.96); }

    .debug-panel {
      width: 100%;
      margin-top: 22px;
      padding: 20px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 16px 40px rgba(83, 64, 160, .09);
    }

    .debug-panel h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

      border-radius: 18px;
      background: #111827;
      color: #d1fae5;
